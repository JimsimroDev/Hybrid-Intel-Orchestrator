spring:
  application:
    name: hybrid-intel-orchestrator

management:
  info:
    env:
      enabled: true
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health

server:
  address: 0.0.0.0
  port: 5001
  compression:
    enabled: true
    min-response-size: 2048
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  servlet:
    context-path: /api/v1

info:
  application:
    groupId: "@project.groupId@"
    artifactId: "@project.artifactId@"
    version: "@project.version@"
app:
  documents-path: documents
  service:
    api-key: ${MY_API_KEY}
    fast-api: ${FAST_API}

cors-settings:
  url-production: ${URL_PRODUCTION}
  url-production1: ${URL_PRODUCTION1}